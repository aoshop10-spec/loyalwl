<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Loyal — Admin</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%231f6feb'/><rect x='6' y='4' width='14' height='18' rx='2' fill='white'/><circle cx='7.5' cy='9' r='1.5' fill='%231f6feb'/><circle cx='7.5' cy='14' r='1.5' fill='%231f6feb'/><circle cx='7.5' cy='19' r='1.5' fill='%231f6feb'/><rect x='11' y='8' width='7' height='1.5' rx='0.75' fill='%23c0ccd8'/><rect x='11' y='12' width='6' height='1.5' rx='0.75' fill='%23c0ccd8'/><rect x='11' y='16' width='7' height='1.5' rx='0.75' fill='%23c0ccd8'/><circle cx='20' cy='22' r='4.5' fill='white' opacity='0.2' stroke='white' stroke-width='1.5'/><circle cx='20' cy='22' r='3' fill='%230d2a5e'/><line x1='23.5' y1='25.5' x2='27' y2='29' stroke='white' stroke-width='1.8' stroke-linecap='round'/></svg>"/>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0d1117; --bg2: #161b22; --bg3: #1c2128;
      --border: #30363d; --border2: #21262d;
      --accent: #1f6feb; --accent-h: #388bfd;
      --text: #e6edf3; --text-2: #8b949e; --text-3: #484f58;
      --green: #3fb950; --red: #f85149; --orange: #d29922;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); font-size: 13px; display: flex; flex-direction: column; min-height: 100vh; }
    .topbar { display: flex; align-items: center; padding: 12px 20px; background: var(--bg2); border-bottom: 1px solid var(--border); }
    .logo-badge { background: var(--red); color: white; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; margin-left: 10px; }
    .btn { padding: 5px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; border: 1px solid transparent; transition: 0.15s; }
    .btn-primary { background: var(--accent); color: white; width: 100%; margin-top: 10px; }
    .btn-ghost { background: transparent; color: var(--text-2); border-color: var(--border); }
    #loginGate { flex: 1; display: flex; align-items: center; justify-content: center; }
    .login-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 32px; width: 380px; }
    .form-input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 7px; color: var(--text); padding: 10px; margin-top: 5px; outline: none; }
    #adminApp { display: none; flex: 1; padding: 20px; }
    .table-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; margin-top: 20px; }
    .ip-table { width: 100%; border-collapse: collapse; }
    .ip-table td, .ip-table th { padding: 12px; border-bottom: 1px solid var(--border2); text-align: left; }
    .err-msg { color: var(--red); font-size: 12px; margin-top: 10px; display: none; }
    .toast { position: fixed; bottom: 20px; right: 20px; padding: 10px 20px; border-radius: 8px; background: var(--bg2); border: 1px solid var(--accent); opacity: 0; transition: 0.3s; }
  </style>
</head>
<body>

<div class="topbar">
  <strong>LOYAL</strong> <span class="logo-badge">ADMIN</span>
  <div style="margin-left: auto;">
    <button class="btn btn-ghost" onclick="adminLogout()">Déconnexion</button>
  </div>
</div>

<div id="loginGate">
  <div class="login-card">
    <div style="font-weight:700; margin-bottom:10px;">🔐 Accès Administrateur</div>
    <div style="color:var(--text-2); font-size:12px; margin-bottom:20px;">Utilisez votre mot de passe pour gérer la whitelist.</div>
    <label style="font-size:11px; color:var(--text-2);">MOT DE PASSE ADMIN</label>
    <input class="form-input" type="password" id="adminPwd" placeholder="••••••••"/>
    <button class="btn btn-primary" onclick="adminLogin()">Accéder au panneau →</button>
    <div class="err-msg" id="loginErr">Mot de passe incorrect ou erreur réseau.</div>
  </div>
</div>

<div id="adminApp">
  <h2>🌐 Whitelist IP Active</h2>
  <div class="table-wrap" id="ipTableWrap">
    <div style="padding:20px; color:var(--text-3);">Chargement des données...</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// --- CONFIGURATION BRUTE ---
let adminPassword = 'monmotdepasse'; // Ton mot de passe
const MY_IP = '88.173.62.149'; // Ton IP

async function adminLogin() {
  const pwd = document.getElementById('adminPwd').value.trim();
  const btn = document.querySelector('.btn-primary');
  const err = document.getElementById('loginErr');
  
  if (!pwd) return;
  
  btn.textContent = 'Connexion...';
  btn.disabled = true;
  err.style.display = 'none';

  try {
    // Tentative d'auto-whitelist avec l'IP brute et le mot de passe entré
    const res = await fetch('/api/ips', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-admin-password': pwd },
      body: JSON.stringify({ ip: MY_IP, label: "Admin Accès Direct" })
    });

    if (res.ok) {
      adminPassword = pwd;
      document.getElementById('loginGate').style.display = 'none';
      document.getElementById('adminApp').style.display = 'block';
      loadIps();
    } else {
      err.style.display = 'block';
      err.textContent = "Accès refusé. Vérifiez le mot de passe.";
    }
  } catch (e) {
    err.style.display = 'block';
    err.textContent = "Erreur de connexion au serveur.";
  } finally {
    btn.textContent = 'Accéder au panneau →';
    btn.disabled = false;
  }
}

async function loadIps() {
  const wrap = document.getElementById('ipTableWrap');
  try {
    const res = await fetch('/api/ips', {
      headers: { 'x-admin-password': adminPassword }
    });
    const ips = await res.json();
    
    if (ips.length === 0) {
      wrap.innerHTML = '<div style="padding:20px;">Aucune IP whitelistée.</div>';
      return;
    }

    let html = '<table class="ip-table"><tr><th>IP</th><th>Label</th><th>Action</th></tr>';
    ips.forEach(item => {
      html += `<tr>
        <td style="font-family:monospace; color:#388bfd">${item.ip}</td>
        <td>${item.label || '—'}</td>
        <td><button class="btn btn-ghost" style="color:#f85149" onclick="removeIp('${item.ip}')">Retirer</button></td>
      </tr>`;
    });
    html += '</table>';
    wrap.innerHTML = html;
  } catch (e) {
    wrap.innerHTML = '<div style="padding:20px;">Erreur de chargement des IPs.</div>';
  }
}

async function removeIp(ip) {
  if (!confirm("Retirer cette IP ?")) return;
  await fetch('/api/ips/' + encodeURIComponent(ip), {
    method: 'DELETE',
    headers: { 'x-admin-password': adminPassword }
  });
  loadIps();
}

function adminLogout() {
  location.reload();
}

// Support de la touche Entrée
document.getElementById('adminPwd').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') adminLogin();
});
</script>

</body>
</html>
