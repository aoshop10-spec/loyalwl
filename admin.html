<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Loyal — Admin</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%231f6feb'/><rect x='6' y='4' width='14' height='18' rx='2' fill='white'/><circle cx='7.5' cy='9' r='1.5' fill='%231f6feb'/><circle cx='7.5' cy='14' r='1.5' fill='%231f6feb'/><circle cx='7.5' cy='19' r='1.5' fill='%231f6feb'/><rect x='11' y='8' width='7' height='1.5' rx='0.75' fill='%23c0ccd8'/><rect x='11' y='12' width='6' height='1.5' rx='0.75' fill='%23c0ccd8'/><rect x='11' y='16' width='7' height='1.5' rx='0.75' fill='%23c0ccd8'/><circle cx='20' cy='22' r='4.5' fill='white' opacity='0.2' stroke='white' stroke-width='1.5'/><circle cx='20' cy='22' r='3' fill='%230d2a5e'/><line x1='23.5' y1='25.5' x2='27' y2='29' stroke='white' stroke-width='1.8' stroke-linecap='round'/></svg>"/>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0d1117; --bg2: #161b22; --bg3: #1c2128;
      --border: #30363d; --border2: #21262d;
      --accent: #1f6feb; --accent-h: #388bfd;
      --text: #e6edf3; --text-2: #8b949e; --text-3: #484f58;
      --green: #3fb950; --red: #f85149; --orange: #d29922;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; }
    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: var(--bg); color: var(--text);
      font-size: 13px; line-height: 1.5;
      display: flex; flex-direction: column;
    }

    /* ── TOPBAR ── */
    .topbar {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 20px;
      background: var(--bg2); border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .topbar-logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 14px; }
    .logo-badge { background: var(--red); color: white; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; letter-spacing: 0.5px; }
    .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }

    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 12px; border-radius: 6px;
      font-family: 'IBM Plex Sans', sans-serif; font-size: 12px; font-weight: 500;
      cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
    }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-h); }
    .btn-ghost { background: transparent; color: var(--text-2); border-color: var(--border); }
    .btn-ghost:hover { background: var(--bg3); color: var(--text); }
    .btn-danger { background: rgba(248,81,73,0.1); color: var(--red); border-color: rgba(248,81,73,0.3); }
    .btn-danger:hover { background: rgba(248,81,73,0.2); }
    .btn-sm { padding: 4px 10px; font-size: 11px; }
    .btn-full { width: 100%; justify-content: center; padding: 10px; font-size: 13px; }

    /* ── LOGIN GATE ── */
    #loginGate { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .login-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 12px; padding: 32px; max-width: 380px; width: 100%;
      box-shadow: 0 16px 48px rgba(0,0,0,0.5);
    }
    .login-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
    .login-sub { font-size: 12px; color: var(--text-2); margin-bottom: 24px; }

    .form-group { margin-bottom: 14px; }
    .form-label { display: block; font-size: 11px; font-weight: 600; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
    .form-input {
      width: 100%; background: var(--bg3); border: 1px solid var(--border);
      border-radius: 7px; color: var(--text);
      font-family: 'IBM Plex Mono', monospace; font-size: 13px;
      padding: 9px 12px; outline: none; transition: border-color 0.15s;
    }
    .form-input:focus { border-color: var(--accent); }
    .form-input::placeholder { color: var(--text-3); }

    .err-msg { color: var(--red); font-size: 12px; margin-top: 10px; display: none; }
    .err-msg.show { display: block; }

    /* ── MAIN APP ── */
    #adminApp { flex: 1; display: none; flex-direction: column; overflow: hidden; }
    #adminApp.show { display: flex; }
    .layout { flex: 1; display: flex; overflow: hidden; }

    /* Sidebar */
    .sidebar {
      width: 220px; min-width: 220px;
      background: var(--bg2); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; padding: 16px 0; overflow-y: auto;
    }
    .sidebar-section { padding: 0 10px; margin-bottom: 20px; }
    .sidebar-title { font-size: 10px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.8px; padding: 4px 6px 8px; }
    .nav-btn {
      display: flex; align-items: center; gap: 9px;
      padding: 7px 10px; border-radius: 6px;
      color: var(--text-2); font-size: 13px;
      cursor: pointer; transition: all 0.1s;
      background: none; border: none; width: 100%; text-align: left;
      font-family: 'IBM Plex Sans', sans-serif;
    }
    .nav-btn:hover { background: var(--bg3); color: var(--text); }
    .nav-btn.active { background: rgba(31,111,235,0.12); color: var(--accent-h); }

    .stat-card { margin: 0 10px 8px; background: var(--bg3); border: 1px solid var(--border2); border-radius: 8px; padding: 12px; }
    .stat-val { font-size: 24px; font-weight: 700; font-family: 'IBM Plex Mono', monospace; color: var(--text); }
    .stat-label { font-size: 11px; color: var(--text-2); margin-top: 2px; }

    /* Main content */
    .content { flex: 1; overflow-y: auto; padding: 20px; }
    .section { display: none; }
    .section.active { display: block; }

    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
    .section-title-text { font-size: 15px; font-weight: 700; }
    .section-actions { display: flex; gap: 8px; }

    /* IP Whitelist */
    .table-wrap { background: var(--bg2); border: 1px solid var(--border2); border-radius: 8px; overflow: hidden; }

    .ip-table { width: 100%; border-collapse: collapse; }
    .ip-table th {
      text-align: left; padding: 8px 14px;
      font-size: 11px; font-weight: 600; color: var(--text-3);
      text-transform: uppercase; letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border2); background: var(--bg3);
    }
    .ip-table td { padding: 11px 14px; border-bottom: 1px solid var(--border2); font-size: 12px; vertical-align: middle; }
    .ip-table tr:hover td { background: rgba(31,111,235,0.04); }
    .ip-table tr:last-child td { border-bottom: none; }

    .ip-addr { font-family: 'IBM Plex Mono', monospace; color: var(--accent-h); font-size: 12px; }
    .ip-date { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text-3); }

    .badge { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.4px; }
    .badge-green { background: rgba(63,185,80,0.12); color: var(--green); border: 1px solid rgba(63,185,80,0.2); }

    /* Add IP form */
    .add-ip-form {
      background: var(--bg2); border: 1px solid var(--border2);
      border-radius: 8px; padding: 20px; max-width: 480px; margin-bottom: 20px;
    }
    .add-ip-form .form-row { display: flex; gap: 8px; align-items: flex-end; }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center;
      padding: 1rem; opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 12px; width: 100%; max-width: 440px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
      transform: translateY(20px); transition: transform 0.2s;
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal-header { padding: 20px 22px 14px; border-bottom: 1px solid var(--border2); font-size: 14px; font-weight: 700; }
    .modal-body { padding: 18px 22px; }
    .modal-footer { padding: 14px 22px; border-top: 1px solid var(--border2); display: flex; justify-content: flex-end; gap: 8px; }

    /* Toast */
    .toast {
      position: fixed; bottom: 1.5rem; right: 1.5rem;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 16px; font-size: 12px;
      display: flex; align-items: center; gap: 8px;
      z-index: 999; transform: translateY(80px); opacity: 0;
      transition: all 0.25s cubic-bezier(.34,1.56,.64,1);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.ok { border-color: rgba(63,185,80,0.4); }
    .toast.err { border-color: rgba(248,81,73,0.4); }

    .empty-state { text-align: center; padding: 3rem; color: var(--text-3); }
    .empty-state .icon { font-size: 2rem; margin-bottom: 8px; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<!-- ── TOPBAR ── -->
<div class="topbar">
  <div class="topbar-logo">
    <div style="width:28px; height:28px; background:#1f6feb; border-radius:7px; display:flex; align-items:center; justify-content:center; flex-shrink:0; overflow:hidden;">
      <svg width="20" height="20" viewBox="0 0 90 90" xmlns="http://www.w3.org/2000/svg">
        <rect x="18" y="10" width="46" height="58" rx="5" fill="white"/>
        <circle cx="21" cy="24" r="4" fill="#1f6feb" stroke="white" stroke-width="1.2"/>
        <circle cx="21" cy="39" r="4" fill="#1f6feb" stroke="white" stroke-width="1.2"/>
        <circle cx="21" cy="54" r="4" fill="#1f6feb" stroke="white" stroke-width="1.2"/>
        <rect x="30" y="22" width="26" height="3" rx="1.5" fill="#c0ccd8"/>
        <rect x="30" y="30" width="22" height="3" rx="1.5" fill="#c0ccd8"/>
        <rect x="30" y="38" width="26" height="3" rx="1.5" fill="#c0ccd8"/>
        <rect x="30" y="46" width="18" height="3" rx="1.5" fill="#c0ccd8"/>
        <rect x="30" y="54" width="23" height="3" rx="1.5" fill="#c0ccd8"/>
        <circle cx="56" cy="62" r="14" fill="white" opacity="0.18" stroke="white" stroke-width="3.5"/>
        <circle cx="56" cy="62" r="10.5" fill="#1a3a6b" opacity="0.9"/>
        <circle cx="51" cy="57" r="3" fill="white" opacity="0.3"/>
        <line x1="67" y1="72" x2="76" y2="81" stroke="white" stroke-width="4" stroke-linecap="round"/>
      </svg>
    </div>
    <span class="logo-badge">ADMIN</span>
    <span style="color:var(--text-2); font-weight:400;">Whitelist IP</span>

  <div class="topbar-right">
    <span id="clockTop" style="font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--text-3);"></span>

</div>

<!-- ── LOGIN GATE ── -->
<div id="loginGate">
  <div class="login-card">
    <div class="login-title">🔐 Accès Administrateur</div>
    <div class="login-sub">Ce panneau est réservé aux administrateurs Loyal.</div>
    <div class="form-group">
      <label class="form-label">Mot de passe admin</label>
      <input class="form-input" type="password" id="adminPwd" placeholder="••••••••" autocomplete="off"/>
    </div>
    <button class="btn btn-primary btn-full" onclick="adminLogin()">Accéder au panneau →</button>
    <div class="err-msg" id="loginErr">Mot de passe incorrect.</div>
  </div>
</div>

<!-- ── PANNEAU ADMIN ── -->
<div id="adminApp">
  <div class="layout">

    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-title">Navigation</div>
        <button class="nav-btn active" id="nav-ips" onclick="showTab('ips',this)">🌐 Whitelist IP</button>
        <button class="nav-btn" id="nav-add" onclick="showTab('add',this)">➕ Ajouter une IP</button>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-title">Stats</div>
        <div class="stat-card">
          <div class="stat-val" id="statIPs">—</div>
          <div class="stat-label">IPs autorisées</div>
        </div>
      </div>
    </div>

    <!-- Contenu -->
    <div class="content">

      <!-- Tab: Whitelist IP -->
      <div class="section active" id="tab-ips">
        <div class="section-header">
          <div class="section-title-text">🌐 Whitelist IP</div>
          <div class="section-actions">
            <button class="btn btn-ghost btn-sm" onclick="loadIps()">↻ Rafraîchir</button>
            <button class="btn btn-danger btn-sm" onclick="clearAllIps()">⊘ Vider la liste</button>
          </div>
        </div>
        <div class="table-wrap" id="ipTableWrap">
          <div class="empty-state"><div class="icon">🌐</div><p>Chargement…</p></div>
        </div>
      </div>

      <!-- Tab: Ajouter une IP -->
      <div class="section" id="tab-add">
        <div class="section-header">
          <div class="section-title-text">➕ Ajouter une IP</div>
        </div>
        <div style="max-width:480px;">
          <div class="table-wrap" style="padding:20px;">
            <div class="form-group">
              <label class="form-label">Adresse IP</label>
              <div style="display:flex; gap:8px;">
                <input class="form-input" type="text" id="addIpAddr" placeholder="Ex: 92.184.100.1" style="flex:1;"/>
                <button class="btn btn-ghost btn-sm" onclick="fetchMyIp()" title="Récupérer l'IP actuelle via le serveur" style="flex-shrink:0;">📡 Mon IP</button>
              </div>
              <div style="font-size:11px; color:var(--text-3); margin-top:5px;">Clique 📡 pour pré-remplir avec l'IP exacte vue par le serveur.</div>
            </div>
            <div class="form-group">
              <label class="form-label">Label (optionnel)</label>
              <input class="form-input" type="text" id="addIpLabel" placeholder="Ex: Sophie MARTIN, Bureau Paris…"/>
            </div>
            <button class="btn btn-primary" onclick="addIp()" style="width:100%; justify-content:center; padding:10px;">
              Ajouter à la whitelist →
            </button>
          </div>
        </div>
      </div>

    </div><!-- /content -->
  </div><!-- /layout -->
</div><!-- /adminApp -->

<!-- Modal: éditer label d'une IP -->
<div class="modal-overlay" id="modalEditIp">
  <div class="modal">
    <div class="modal-header">✏️ Modifier le label</div>
    <div class="modal-body">
      <input type="hidden" id="editIpAddr"/>
      <div class="form-group">
        <label class="form-label">IP</label>
        <input class="form-input" type="text" id="editIpDisplay" disabled/>
      </div>
      <div class="form-group">
        <label class="form-label">Label</label>
        <input class="form-input" type="text" id="editIpLabel" placeholder="Nom, description…"/>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost btn-sm" onclick="closeModal('modalEditIp')">Annuler</button>
      <button class="btn btn-primary btn-sm" onclick="saveIpLabel()">Enregistrer</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────────
let adminPassword = 'loyal_admin_2024';

// ── AUTH ADMIN ────────────────────────────────────────────────

async function adminLogin() {
  const pwdInput = document.getElementById('adminPwd');
  const pwd = pwdInput.value.trim();
  if (!pwd) return;

  const btn = document.querySelector('#loginGate .btn-primary');
  const originalText = btn.textContent;
  btn.textContent = 'Vérification & Auto-WL...';
  btn.disabled = true;

  try {
    // 1. Récupérer l'IP actuelle du client
    const ipRes = await fetch('/api/myip');
    const ipData = await ipRes.json();
    const myIp = ipData.ip;

    // 2. Envoyer une requête POST pour ajouter cette IP à la whitelist
    // On envoie le mot de passe dans le header 'x-admin-password'
    const res = await fetch('/api/ips', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-admin-password': pwd
      },
      body: JSON.stringify({ ip: myIp, label: "Admin Auto-Login" })
    });

    if (res.ok) {
      adminPassword = pwd;
      document.getElementById('loginGate').style.display = 'none';
      document.getElementById('adminApp').classList.add('show');
      loadIps();
      showToast('IP ' + myIp + ' ajoutée à la whitelist', 'ok');
    } else {
      document.getElementById('loginErr').textContent = 'Mot de passe incorrect ou erreur serveur';
      document.getElementById('loginErr').classList.add('show');
    }
  } catch (e) {
    document.getElementById('loginErr').textContent = 'Erreur: ' + e.message;
    document.getElementById('loginErr').classList.add('show');
  } finally {
    btn.textContent = originalText;
    btn.disabled = false;
  }
}

    });


    if (res.ok) {
      adminPassword = pwd;
      document.getElementById('loginGate').style.display = 'none';
      document.getElementById('adminApp').classList.add('show');
      loadIps();
      document.getElementById('loginErr').classList.remove('show');
    } else {
      document.getElementById('loginErr').classList.add('show');
    }
  } catch (e) {
    document.getElementById('loginErr').textContent = 'Erreur réseau: ' + e.message;
    document.getElementById('loginErr').classList.add('show');
  } finally {
    btn.textContent = 'Accéder au panneau →';
    btn.disabled = false;
  }
}

function adminLogout() {
  adminPassword = 'loyal_admin_2024';
  document.getElementById('adminApp').classList.remove('show');
  document.getElementById('loginGate').style.display = 'flex';
  document.getElementById('adminPwd').value = '';
}

document.getElementById('adminPwd').addEventListener('keydown', e => { if (e.key === 'Enter') adminLogin(); });

// ── TABS ──────────────────────────────────────────────────────
function showTab(name, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'ips') loadIps();
}

// ── API HELPERS ───────────────────────────────────────────────
function adminHeaders() {
  return { 'Content-Type': 'application/json', 'x-admin-password': adminPassword };
}

function fmtDate(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  return d.toLocaleDateString('fr-FR') + ' ' + d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
}

// ── LOAD IPS ──────────────────────────────────────────────────
async function loadIps() {
  try {
    const res = await fetch('/api/ips', { headers: adminHeaders() });
    if (!res.ok) {
      const txt = await res.text();
      showToast('Erreur ' + res.status + ': ' + txt.slice(0,60), 'err');
      return;
    }
    const ips = await res.json();
    renderIps(ips);
    document.getElementById('statIPs').textContent = ips.length;
  } catch (e) {
    showToast('Erreur réseau: ' + e.message, 'err');
    console.error('loadIps error:', e);
  }
}

function renderIps(ips) {
  const wrap = document.getElementById('ipTableWrap');
  if (!ips.length) {
    wrap.innerHTML = `<div class="empty-state"><div class="icon">🌐</div><p>Aucune IP whitelistée</p></div>`;
    return;
  }
  wrap.innerHTML = `
    <table class="ip-table">
      <thead>
        <tr>
          <th>Adresse IP</th>
          <th>Label</th>
          <th>Ajoutée le</th>
          <th>État</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        ${ips.map(e => `
          <tr>
            <td><span class="ip-addr">${escHtml(e.ip)}</span></td>
            <td style="color:var(--text-2);">${escHtml(e.label || '—')}</td>
            <td><span class="ip-date">${fmtDate(e.addedAt)}</span></td>
            <td><span class="badge badge-green">● Autorisée</span></td>
            <td>
              <div style="display:flex; gap:4px;">
                <button class="btn btn-ghost btn-sm" onclick="openEditIp('${escHtml(e.ip)}','${escHtml(e.label||'')}')">✏️</button>
                <button class="btn btn-danger btn-sm" onclick="removeIp('${escHtml(e.ip)}')">⊘ Retirer</button>
              </div>
            </td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

// ── ADD IP ────────────────────────────────────────────────────
async function addIp() {
  const ip    = document.getElementById('addIpAddr').value.trim();
  const label = document.getElementById('addIpLabel').value.trim();
  if (!ip) { showToast('IP manquante', 'err'); return; }
  try {
    const res = await fetch('/api/ips', {
      method: 'POST',
      headers: adminHeaders(),
      body: JSON.stringify({ ip, label }),
    });
    const data = await res.json();
    if (data.ok) {
      showToast(`IP ${ip} ajoutée ✓`, 'ok');
      document.getElementById('addIpAddr').value = '';
      document.getElementById('addIpLabel').value = '';
      loadIps();
      showTab('ips', document.getElementById('nav-ips'));
    } else {
      showToast(data.error || 'Erreur ajout', 'err');
    }
  } catch (e) {
    showToast('Erreur réseau: ' + e.message, 'err'); console.error(e);
  }
}

// ── REMOVE IP ─────────────────────────────────────────────────
async function removeIp(ip) {
  if (!confirm(`Retirer l'IP ${ip} de la whitelist ?`)) return;
  try {
    const res = await fetch('/api/ips/' + encodeURIComponent(ip), { method: 'DELETE', headers: adminHeaders() });
    if (!res.ok) { showToast('Erreur ' + res.status, 'err'); return; }
    const data = await res.json();
    if (data.ok) { showToast(`IP ${ip} retirée`, 'ok'); loadIps(); }
    else showToast(data.error || 'Erreur suppression', 'err');
  } catch (e) {
    showToast('Erreur réseau: ' + e.message, 'err'); console.error(e);
  }
}

// ── CLEAR ALL ─────────────────────────────────────────────────
async function clearAllIps() {
  if (!confirm('Vider toute la whitelist ? Tous les accès seront bloqués.')) return;
  try {
    const res = await fetch('/api/ips', { method: 'DELETE', headers: adminHeaders() });
    if (!res.ok) { showToast('Erreur ' + res.status, 'err'); return; }
    const data = await res.json();
    if (data.ok) { showToast('Whitelist vidée', 'ok'); loadIps(); }
    else showToast(data.error || 'Erreur suppression', 'err');
  } catch (e) {
    showToast('Erreur réseau: ' + e.message, 'err'); console.error(e);
  }
}

// ── EDIT LABEL ────────────────────────────────────────────────
function openEditIp(ip, label) {
  document.getElementById('editIpAddr').value = ip;
  document.getElementById('editIpDisplay').value = ip;
  document.getElementById('editIpLabel').value = label;
  openModal('modalEditIp');
}

async function saveIpLabel() {
  const ip    = document.getElementById('editIpAddr').value;
  const label = document.getElementById('editIpLabel').value.trim();
  try {
    const res = await fetch('/api/ips/' + encodeURIComponent(ip), {
      method: 'PATCH',
      headers: adminHeaders(),
      body: JSON.stringify({ label }),
    });
    if (!res.ok) { showToast('Erreur ' + res.status, 'err'); return; }
    const data = await res.json();
    if (data.ok) {
      closeModal('modalEditIp');
      showToast('Label mis à jour', 'ok');
      loadIps();
    } else {
      showToast(data.error || 'Erreur mise à jour', 'err');
    }
  } catch (e) {
    showToast('Erreur réseau: ' + e.message, 'err'); console.error(e);
  }
}

// ── FETCH MY IP ───────────────────────────────────────────────
async function fetchMyIp() {
  try {
    const r = await fetch('/api/myip');
    const d = await r.json();
    if (d.ip) {
      document.getElementById('addIpAddr').value = d.ip;
      showToast('IP récupérée : ' + d.ip, 'ok');
    }
  } catch (e) {
    showToast('Impossible de récupérer l\'IP', 'err');
  }
}

// ── MODALS ────────────────────────────────────────────────────
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
});

// ── HELPERS ───────────────────────────────────────────────────
function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

let _toastT;
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast ${type} show`;
  clearTimeout(_toastT);
  _toastT = setTimeout(() => t.classList.remove('show'), 2600);
}

// Horloge
setInterval(() => {
  const now = new Date();
  const el = document.getElementById('clockTop');
  if (el) el.textContent = [now.getHours(),now.getMinutes(),now.getSeconds()].map(n=>n.toString().padStart(2,'0')).join(':');
}, 1000);
</script>
