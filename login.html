<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Loyal — Accès refusé</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%231f6feb'/><rect x='6' y='4' width='14' height='18' rx='2' fill='white'/><circle cx='7.5' cy='9' r='1.5' fill='%231f6feb'/><circle cx='7.5' cy='14' r='1.5' fill='%231f6feb'/><circle cx='7.5' cy='19' r='1.5' fill='%231f6feb'/><rect x='11' y='8' width='7' height='1.5' rx='0.75' fill='%23c0ccd8'/><rect x='11' y='12' width='6' height='1.5' rx='0.75' fill='%23c0ccd8'/><rect x='11' y='16' width='7' height='1.5' rx='0.75' fill='%23c0ccd8'/><circle cx='20' cy='22' r='4.5' fill='white' opacity='0.2' stroke='white' stroke-width='1.5'/><circle cx='20' cy='22' r='3' fill='%230d2a5e'/><line x1='23.5' y1='25.5' x2='27' y2='29' stroke='white' stroke-width='1.8' stroke-linecap='round'/></svg>"/>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0d1117; --bg2: #161b22; --bg3: #1c2128;
      --border: #30363d; --border2: #21262d;
      --accent: #1f6feb; --accent-h: #388bfd;
      --text: #e6edf3; --text-2: #8b949e; --text-3: #484f58;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; }
    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; overflow: hidden;
    }

    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(31,111,235,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(31,111,235,0.04) 1px, transparent 1px);
      background-size: 32px 32px;
      animation: gridShift 20s linear infinite;
    }
    @keyframes gridShift { from { background-position: 0 0; } to { background-position: 32px 32px; } }

    .glow {
      position: fixed; width: 500px; height: 500px; border-radius: 50%;
      background: radial-gradient(circle, rgba(31,111,235,0.08) 0%, transparent 70%);
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      pointer-events: none; z-index: 0;
    }

    .card {
      position: relative; z-index: 1;
      width: 100%; max-width: 380px; margin: 1rem;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 16px; overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
      animation: cardIn 0.5s cubic-bezier(.34,1.56,.64,1) both;
      text-align: center;
    }
    @keyframes cardIn {
      from { opacity:0; transform:translateY(32px) scale(0.94); }
      to   { opacity:1; transform:none; }
    }

    .card-header {
      padding: 36px 28px 26px;
      display: flex; flex-direction: column; align-items: center; gap: 14px;
    }

    .logo-box {
      width: 72px; height: 72px; border-radius: 18px;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 28px rgba(31,111,235,0.45);
      animation: logoPulse 3s ease-in-out 1s infinite;
    }
    @keyframes logoPulse {
      0%, 100% { box-shadow: 0 8px 28px rgba(31,111,235,0.45); }
      50%       { box-shadow: 0 8px 40px rgba(31,111,235,0.7); }
    }

    .card-title { font-size: 22px; font-weight: 700; color: var(--text); }
    .card-subtitle {
      font-size: 12px; color: var(--text-2); line-height: 1.6;
      max-width: 270px;
    }

    .ip-badge {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 6px; padding: 6px 14px;
      font-family: 'IBM Plex Mono', monospace; font-size: 12px;
      color: var(--text-3); margin-top: 4px;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .ip-toggle {
      background: none; border: none; cursor: pointer;
      color: var(--text-3); padding: 0; line-height: 1;
      transition: color 0.15s; display: flex; align-items: center;
    }
    .ip-toggle:hover { color: var(--text-2); }

    .card-body { padding: 0 28px 28px; }

    .tg-btn {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 14px;
      background: #2AABEE; color: white;
      border: none; border-radius: 10px;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 14px; font-weight: 600;
      cursor: pointer; text-decoration: none;
      transition: background 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 16px rgba(42,171,238,0.3);
    }
    .tg-btn:hover { background: #1d96d4; box-shadow: 0 6px 24px rgba(42,171,238,0.5); }
    .tg-icon { width: 22px; height: 22px; flex-shrink:0; }

    .card-footer {
      padding: 12px 28px 16px; font-size: 11px; color: var(--text-3);
      border-top: 1px solid var(--border2);
      display: flex; align-items: center; justify-content: space-between;
    }
    .admin-link { color: var(--text-3); text-decoration: none; transition: color 0.15s; }
    .admin-link:hover { color: var(--accent-h); }
  </style>
</head>
<body>
<div class="bg-grid"></div>
<div class="glow"></div>

<div class="card">
  <div class="card-header">
    <div class="logo-box">
      <svg width="48" height="48" viewBox="0 0 90 90" xmlns="http://www.w3.org/2000/svg">
        <rect x="18" y="10" width="46" height="58" rx="5" fill="white"/>
        <circle cx="21" cy="24" r="4" fill="#1f6feb" stroke="white" stroke-width="1.2"/>
        <circle cx="21" cy="39" r="4" fill="#1f6feb" stroke="white" stroke-width="1.2"/>
        <circle cx="21" cy="54" r="4" fill="#1f6feb" stroke="white" stroke-width="1.2"/>
        <rect x="30" y="22" width="26" height="3" rx="1.5" fill="#c0ccd8"/>
        <rect x="30" y="30" width="22" height="3" rx="1.5" fill="#c0ccd8"/>
        <rect x="30" y="38" width="26" height="3" rx="1.5" fill="#c0ccd8"/>
        <rect x="30" y="46" width="18" height="3" rx="1.5" fill="#c0ccd8"/>
        <rect x="30" y="54" width="23" height="3" rx="1.5" fill="#c0ccd8"/>
        <circle cx="56" cy="62" r="14" fill="white" opacity="0.18" stroke="white" stroke-width="3.5"/>
        <circle cx="56" cy="62" r="10.5" fill="#1a3a6b" opacity="0.9"/>
        <circle cx="51" cy="57" r="3" fill="white" opacity="0.3"/>
        <line x1="67" y1="72" x2="76" y2="81" stroke="white" stroke-width="4" stroke-linecap="round"/>
      </svg>
    </div>

    <div class="card-title">Accès refusé</div>
    <div class="card-subtitle">Votre adresse IP n'est pas autorisée. Contactez-nous sur Telegram pour obtenir un accès.</div>
    <div class="ip-badge">
      <span id="ipDisplay">IP : chargement…</span>
      <button class="ip-toggle" id="ipToggle" onclick="toggleIp()" title="Masquer / Afficher l'IP" style="display:none">
        <svg id="eyeIcon" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 8s2.5-5 7-5 7 5 7 5-2.5 5-7 5-7-5-7-5z"/>
          <circle cx="8" cy="8" r="2"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="card-body">
    <a class="tg-btn" href="https://t.me/freestylezoo" target="_blank">
      <svg class="tg-icon" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
        <path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/>
      </svg>
      @freestylezoo
    </a>
  </div>

  <div class="card-footer">
    <span>Réponse rapide · 7j/7</span>
  </div>
</div>

<script>
  let _realIp = '';
  let _ipHidden = true; // masquée par défaut

  function toggleIp() {
    _ipHidden = !_ipHidden;
    const el = document.getElementById('ipDisplay');
    const eye = document.getElementById('eyeIcon');
    if (_ipHidden) {
      el.textContent = 'Votre IP : ••••••••••••••';
      eye.innerHTML = `
        <path d="M1 8s2.5-5 7-5 7 5 7 5-2.5 5-7 5-7-5-7-5z"/>
        <circle cx="8" cy="8" r="2"/>
        <line x1="2" y1="2" x2="14" y2="14"/>`;
    } else {
      el.textContent = 'Votre IP : ' + _realIp;
      eye.innerHTML = `
        <path d="M1 8s2.5-5 7-5 7 5 7 5-2.5 5-7 5-7-5-7-5z"/>
        <circle cx="8" cy="8" r="2"/>`;
    }
  }

  // Afficher l'IP du visiteur (masquée par défaut)
  (async function() {
    try {
      const res = await fetch('/api/auth/check');
      const data = await res.json();
      const el = document.getElementById('ipDisplay');
      const toggle = document.getElementById('ipToggle');
      if (data.ip) {
        _realIp = data.ip;
        // Masquée par défaut, icône œil barré
        el.textContent = 'Votre IP : ••••••••••••••';
        const eye = document.getElementById('eyeIcon');
        eye.innerHTML = `
          <path d="M1 8s2.5-5 7-5 7 5 7 5-2.5 5-7 5-7-5-7-5z"/>
          <circle cx="8" cy="8" r="2"/>
          <line x1="2" y1="2" x2="14" y2="14"/>`;
        toggle.style.display = 'flex';
        // Si l'IP est déjà autorisée, rediriger une seule fois sans boucle
        if (data.valid) {
          const alreadyRedirected = sessionStorage.getItem('loyal_login_redirect');
          if (!alreadyRedirected) {
            sessionStorage.setItem('loyal_login_redirect', '1');
            window.location.replace('index.html');
          }
          // Sinon ne pas re-rediriger (évite la boucle)
        }
      } else {
        el.textContent = 'IP non détectable';
      }
    } catch (e) {
      document.getElementById('ipDisplay').textContent = 'Erreur de connexion';
    }
  })();
</script>
</body>
</html>
